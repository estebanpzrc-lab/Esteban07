<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <form id="registroForm" class="login-form">
            <h2>Crear Cuenta</h2>
            
            <div class="input-group">
                <label for="regName">Nombre completo:</label>
                <input type="text" id="regName" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="regEmail">Correo electrónico:</label>
                <input type="email" id="regEmail" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label for="regPass">Contraseña:</label>
                <input type="password" id="regPass" placeholder="Crea una contraseña" required>
            </div>
            
            <button type="submit" class="btn-ingresar">Ingresar</button>

            <!-- Enlace para regresar al login si ya tiene cuenta -->
            <p class="registro-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </form>
    </div>

    <script src="js/registro.js"></script>
</body>
</html>
